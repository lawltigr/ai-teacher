<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>{{style.name}}</h1>
    <div class="avatar">
        <img src="{{style.avatar.url }}" alt="{{ style.name }}">
    </div>
    <div class="chat-box">
        <div id="messages"></div>
        <input type="text" placeholder="Ask something..." id="userInput">
        <button onclick="sendMessage()">Send</button>
    </div>
    <br>
    <a href="{% url 'select_style' %}">Go Back</a>
</body>

{% csrf_token %}

<script>
    async function sendMessage() {
        const input = document.getElementById("userInput");
        const message = input.value;

        if (!message) return;

        const messagesDiv = document.getElementById("messages");
        messagesDiv.innerHTML += "<p><b>You: </b>" + message + "</p>";
        input.value = "";

        const response = await fetch("/ask/{{ style.id }}/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({ message: message })
        });
        const data = await response.json();
        messagesDiv.innerHTML += "<p><b>{{ style.name }}: </b>" + data.answer + "</p>";
    }
</script>

<style>
    body{
        text-align: center;
        background: #f4f4f4;
    }
    .avatar{
        margin-top: 30px;
    }
    img{
        width: 200px;
        border-radius: 50%;
    }
    .chat-box{
        margin-top: 30px;
    }
    input{
        padding: 10px;
        width: 300px;
    }
    button{
        padding: 10px;
    }
</style>
</html>
