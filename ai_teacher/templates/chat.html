<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>{{style.name}}</h1>
    <div class="avatar">
        <img src="{{style.avatar.url }}" alt="{{ style.name }}">
    </div>
    <div class="chat-box">
        <input type="text" placeholder="Ask something...">
        <button>Send</button>
    </div>
    <br>
    <a href="{% url 'select_style' %}">Go Back</a>
</body>
<style>
    body{
        text-align: center;
        background: #f4f4f4;
    }
    .avatar{
        margin-top: 30px;
    }
    img{
        width: 200px;
        border-radius: 50%;
    }
    .chat-box{
        margin-top: 30px;
    }
    input{
        padding: 10px;
        width: 300px;
    }
    button{
        padding: 10px;
    }
</style>
</html>
